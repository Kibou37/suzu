name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm exec tsc -p packages/shared/tsconfig.json

      - name: Generate Prisma client
        run: pnpm --filter @suzuki/backend exec prisma generate

      - name: Build backend
        run: pnpm --filter @suzuki/backend build

      - name: Build frontend
        run: pnpm --filter @suzuki/frontend build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Lint frontend
        run: pnpm --filter @suzuki/frontend lint
