services:
  mysql:
    image: mysql:8.4
    container_name: suzuki-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: suzuki
      MYSQL_USER: suzuki
      MYSQL_PASSWORD: suzuki
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: suzuki-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: suzuki-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      API_PORT: 4000
      DATABASE_URL: mysql://suzuki:suzuki@mysql:3306/suzuki
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: change-me-in-development
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["sh", "/app/docker/backend-entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: suzuki-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_INTERNAL_URL: http://backend:4000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # File watching через bind mount на Windows (Docker Desktop)
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      NEXT_WEBPACK_USEPOLLING: "true"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - frontend_next_cache:/app/frontend/.next
    depends_on:
      backend:
        condition: service_healthy
    entrypoint: ["sh", "/app/docker/frontend-entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s

volumes:
  mysql_data:
  redis_data:
  root_node_modules:
  backend_node_modules:
  frontend_node_modules:
  shared_node_modules:
  frontend_next_cache:
